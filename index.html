<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dividendos | Viver de Renda & Consultas B3</title>
  <meta name="description" content="Consulte cotações de Ações, FIIs, BDRs e ETFs em tempo real. Educação financeira para construir patrimônio." />
  <style>
    :root {
      --bg: #0b1220; --card: #111b2e; --deep: #04101a; --grad-a: #07101c; --grad-b: #0b1220;
      --text: #e8eefc; --muted: #a9b6d3; --primary: #31c3ff; --primary-dark: #16a0d8;
      --accent: #7cff92; --gold: #e0b84d; --danger: #ff6b6b; --border: rgba(255,255,255,0.08);
      --shadow: 0 16px 40px rgba(0,0,0,0.28); --btn-text: #04101a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: radial-gradient(circle at top, rgba(49,195,255,0.15), transparent 40%), linear-gradient(180deg, var(--grad-a) 0%, var(--grad-b) 100%); color: var(--text); line-height: 1.6; min-height: 100vh; }
    .container { width: min(1200px, 94%); margin: 0 auto; }
    header { padding: 24px 0 0; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding-bottom: 18px; }
    .brand { font-weight: 700; color: var(--primary); font-size: 1.2rem; }
    .hg-busca { padding-top: 32px; }
    .hg-painel { background: rgba(17,27,46,0.7); border: 1px solid var(--border); border-radius: 20px; padding: 24px; backdrop-filter: blur(10px); box-shadow: var(--shadow); }
    .hg-linha-busca { display: flex; gap: 10px; flex-wrap: wrap; }
    .hg-linha-busca input { flex: 1 1 200px; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); background: #04101a; color: var(--text); }
    .hg-btn { padding: 0 24px; border-radius: 12px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--btn-text); border: none; cursor: pointer; }
    .hg-status { margin: 14px 0; color: var(--muted); min-height: 1.2em; }
    .hg-card { margin-top: 6px; background: #04101a; border: 1px solid var(--border); border-radius: 16px; padding: 22px; }
  </style>
</head>
<body>
  <header>
    <div class="container topbar">
      <div class="brand">DIVIDENDOS | VIVER DE RENDA</div>
    </div>
  </header>
  <main class="container">
    <section class="hg-busca">
      <div class="hg-painel">
        <div class="hg-linha-busca">
          <input type="text" id="hgTickerInput" value="PETR4" placeholder="Ex: PETR4" />
          <button class="hg-btn" id="hgBtnBuscar">Consultar</button>
        </div>
        <div class="hg-status" id="hgStatus"></div>
        <div id="hgResultado"></div>
      </div>
    </section>
  </main>
  <script>
    (function () {
      const CHAVE_HG = '850310af'; // Chave autorizada para viverderenda.dev.br[cite: 3]
      const btn = document.getElementById('hgBtnBuscar');
      async function hgBuscarAtivo() {
        const ticker = document.getElementById('hgTickerInput').value.trim().toUpperCase();
        const statusEl = document.getElementById('hgStatus');
        const resultadoEl = document.getElementById('hgResultado');
        statusEl.textContent = 'Consultando...';
        try {
          // Inclusão do parâmetro format=json-cors para liberar o acesso via navegador[cite: 5]
          const url = `https://api.hgbrasil.com/v2/finance/quotes?format=json-cors&tickers=B3:${ticker}&key=${CHAVE_HG}`;
          const resp = await fetch(url);
          const data = await resp.json();
          if (data.results && data.results[0]) {
            const a = data.results[0];
            resultadoEl.innerHTML = `<div class="hg-card"><h3>${a.name} (${a.symbol})</h3><p>Preço: R$ ${a.quote.value.toFixed(2)}</p></div>`;
            statusEl.textContent = '';
          } else {
            statusEl.textContent = 'Ativo não encontrado.';
          }
        } catch (e) {
          statusEl.textContent = 'Erro de CORS ou Conexão.';
          console.error('Erro de rede na consulta HG Brasil:', e);
        }
      }
      btn.addEventListener('click', hgBuscarAtivo);
    })();
  </script>
</body>
</html>
