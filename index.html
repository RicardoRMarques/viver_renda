<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dividendos | Viver de Renda & Consultas B3</title>
  <meta name="description" content="Consulte cotações de Ações, FIIs, BDRs e ETFs em tempo real. Educação financeira para construir patrimônio." />
  <style>
    :root {
      --bg: #0b1220;
      --card: #111b2e;
      --deep: #04101a;
      --grad-a: #07101c;
      --grad-b: #0b1220;
      --text: #e8eefc;
      --muted: #a9b6d3;
      --primary: #31c3ff;
      --primary-dark: #16a0d8;
      --accent: #7cff92;
      --gold: #e0b84d;
      --danger: #ff6b6b;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 16px 40px rgba(0,0,0,0.28);
      --btn-text: #04101a;
    }

    html[data-theme="light"] {
      --bg: #eef2f9;
      --card: #ffffff;
      --deep: #f4f7fc;
      --grad-a: #f7f9fd;
      --grad-b: #eef2f9;
      --text: #16223b;
      --muted: #5b6b8c;
      --primary: #0f8fce;
      --primary-dark: #0c73a6;
      --accent: #1f9e4a;
      --gold: #a8781a;
      --danger: #d1435a;
      --border: rgba(15,30,60,0.1);
      --shadow: 0 12px 30px rgba(20,40,80,0.12);
      --btn-text: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, rgba(49,195,255,0.15), transparent 40%), linear-gradient(180deg, var(--grad-a) 0%, var(--grad-b) 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    .container { width: min(1200px, 94%); margin: 0 auto; }
    .val-up { color: var(--accent); font-weight: bold; }
    .val-down { color: var(--danger); font-weight: bold; }

    header { padding: 24px 0 0; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding-bottom: 18px; }
    .brand { font-weight: 700; letter-spacing: 0.4px; color: var(--primary); font-size: 1.2rem; }
    .nav { display: flex; gap: 24px; flex-wrap: wrap; color: var(--muted); font-size: 0.95rem; font-weight: bold; }
    .nav a:hover { color: var(--primary); }

    .theme-toggle {
      display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px;
      border-radius: 50%; border: 1px solid var(--border); background: transparent; cursor: pointer;
      font-size: 1.1rem; transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .theme-toggle:hover { transform: scale(1.08); border-color: var(--primary); }

    .hg-busca { padding-top: 32px; }
    .hg-painel { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; box-shadow: var(--shadow); }
    .hg-linha-busca { display: flex; gap: 10px; flex-wrap: wrap; }
    .hg-linha-busca input { flex: 1 1 200px; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); background: #04101a; color: var(--text); font-size: 1rem; }
    .hg-btn { padding: 0 24px; border-radius: 12px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--btn-text); border: none; cursor: pointer; }
    .hg-status { margin: 14px 0; color: var(--muted); min-height: 1.2em; }
    .hg-card { margin-top: 6px; background: #04101a; border: 1px solid var(--border); border-radius: 16px; padding: 22px; }
    .hg-grid-dados { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 14px; padding-top: 16px; border-top: 1px solid var(--border); }
    
    .section-intro { text-align: center; padding: 50px 0 30px; }
    .split-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; padding-bottom: 60px; }
    .search-container, .boletim-panel { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 28px; box-shadow: var(--shadow); height: 100%; }
    .ranking-row, .indice-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-radius: 12px; background: var(--deep); border: 1px solid var(--border); margin-bottom: 10px; }
    .ranking-row.skeleton, .indice-row.skeleton { height: 48px; background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.08), rgba(255,255,255,0.03)); animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .btn-buy { display: inline-block; padding: 16px 32px; border-radius: 12px; font-weight: 700; background: var(--accent); color: var(--btn-text); transition: transform 0.2s; }
  </style>
</head>
<body>
  <header>
    <div class="container topbar">
      <div class="brand">DIVIDENDOS | VIVER DE RENDA</div>
      <nav class="nav">
        <a href="#consultas">Mercado</a>
        <a href="#educacao">Educação</a>
        <a href="https://yubb.com.br/" target="_blank" rel="noopener noreferrer">Renda Fixa</a>
        <button id="themeToggle" class="theme-toggle">☀️</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hg-busca">
      <div class="hg-painel">
        <div class="hg-linha-busca">
          <input type="text" id="hgTickerInput" value="PETR4" />
          <button class="hg-btn" id="hgBtnBuscar">Consultar</button>
        </div>
        <div class="hg-status" id="hgStatus"></div>
        <div id="hgResultado"></div>
      </div>
    </section>

    <!-- Estrutura de Rankings simplificada mantida do histórico -->
    <section class="split-layout">
        <div class="search-container">
            <h3>🏢 Melhores FIIs: 4 de Logística e 2 de Papel</h3>
            <div id="rankingFiis"><div class="ranking-row skeleton"></div></div>
        </div>
        <div class="boletim-panel">
            <h3>Boletim de mercado</h3>
            <div id="indicesRows"><div class="indice-row skeleton"></div></div>
        </div>
    </section>
  </main>

  <script>
    (function () {
      // CHAVE CORRETA PARA viverderenda.dev.br[cite: 3]
      const CHAVE_HG = '850310af'; 
      const btn = document.getElementById('hgBtnBuscar');
      
      async function hgBuscarAtivo() {
        const ticker = document.getElementById('hgTickerInput').value;
        const statusEl = document.getElementById('hgStatus');
        statusEl.textContent = 'Consultando...';
        
        try {
          // Parâmetro format=json-cors é obrigatório para navegadores[cite: 3]
          const url = `https://api.hgbrasil.com/v2/finance/quotes?format=json-cors&tickers=B3:${ticker}&key=${CHAVE_HG}`;
          const resp = await fetch(url);
          const data = await resp.json();
          document.getElementById('hgResultado').innerHTML = data.results ? 'Ativo carregado.' : 'Erro.';
          statusEl.textContent = '';
        } catch (e) {
          statusEl.textContent = 'Erro de CORS ou Conexão.';
        }
      }
      btn.addEventListener('click', hgBuscarAtivo);
    })();
  </script>
</body>
</html>
