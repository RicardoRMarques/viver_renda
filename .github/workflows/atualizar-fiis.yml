
name: Atualizar Boletim de FIIs

on:
  schedule:
    # Roda todo dia às 08:00 no horário de Brasília (11:00 UTC)
    - cron: "0 11 * * 1-5"
  workflow_dispatch: # permite rodar manualmente pelo botão "Run workflow" no GitHub

permissions:
  contents: write # necessário para o robô poder commitar o JSON atualizado

jobs:
  atualizar-boletim:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar script de coleta (brapi)
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: python coletar_brapi_fiis.py

      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fiis_investidor10.json
          git diff --staged --quiet && echo "Nenhuma mudança nos dados" || git commit -m "Atualização automática do boletim de FIIs - $(date +'%d/%m/%Y')"
          git push
