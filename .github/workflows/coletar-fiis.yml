name: Atualizar Boletim (Notícias, Índices e Ranking)

on:
  schedule:
    # Índices e notícias: todos os dias, a cada 15 minutos, o dia inteiro.
    - cron: "*/15 * * * *"
    # Rankings de Ações/FIIs: só 1x por dia, às 12h UTC (9h em Brasília).
    # Consome bem mais requisições (vários lotes de tickers + endpoint
    # Beta de receita), por isso roda separado do restante.
    - cron: "0 12 * * *"
  # Permite rodar manualmente pela aba "Actions" no GitHub. Ao disparar
  # manualmente, sempre atualiza os rankings também (fica marcado abaixo).
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar coleta de notícias, índices e (às vezes) ranking
        env:
          HGBRASIL_TOKEN: ${{ secrets.HGBRASIL_TOKEN }}
          # Só ativa a coleta de rankings quando o disparo foi o cron das
          # 12h UTC (1x/dia) ou quando rodou manualmente pela aba Actions.
          COLETAR_RANKING: ${{ (github.event.schedule == '0 12 * * *' || github.event_name == 'workflow_dispatch') && '1' || '0' }}
        run: python coletar_hgbrasil.py

      - name: Commitar e enviar noticias.json, indices.json e ranking.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias.json
          if [ -f indices.json ]; then git add indices.json; fi
          if [ -f ranking.json ]; then git add ranking.json; fi
          if git diff --cached --quiet; then
            echo "Sem alterações no boletim, nada para commitar."
          else
            git commit -m "chore: atualizar boletim (notícias, índices, ranking) [skip ci]"
            git pull --rebase origin main
            git push
          fi
