name: Atualizar Boletim (Notícias, Índices e Ranking)

on:
  # Roda em dias úteis, a cada hora, entre 12h e 22h UTC
  # (aprox. 9h às 19h no horário de Brasília, cobrindo o pregão)
  schedule:
    - cron: "0 12-22 * * 1-5"
  # Permite rodar manualmente pela aba "Actions" no GitHub
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar coleta de notícias, índices e ranking
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: python coletar_brapi_fiis.py

      - name: Commitar e enviar noticias.json, indices.json e ranking.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias.json
          if [ -f indices.json ]; then git add indices.json; fi
          if [ -f ranking.json ]; then git add ranking.json; fi
          if git diff --cached --quiet; then
            echo "Sem alterações no boletim, nada para commitar."
          else
            git commit -m "chore: atualizar boletim (notícias, índices, ranking) [skip ci]"
            git push
          fi
