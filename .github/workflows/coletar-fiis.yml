name: Atualizar Notícias (Boletim Viver de Renda)

on:
  # Roda em dias úteis, a cada hora, entre 12h e 22h UTC
  # (aprox. 9h às 19h no horário de Brasília, cobrindo o pregão)
  schedule:
    - cron: "0 12-22 * * 1-5"
  # Permite rodar manualmente pela aba "Actions" no GitHub
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar coleta de notícias
        run: python coletar_brapi_fiis.py

      - name: Commitar e enviar noticias.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias.json
          if git diff --cached --quiet; then
            echo "Sem alterações nas notícias, nada para commitar."
          else
            git commit -m "chore: atualizar notícias do boletim [skip ci]"
            git push
          fi
